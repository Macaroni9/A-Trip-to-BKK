
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Trip to Bangkok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'arcade-accent': 'var(--arcade-accent)',
              'arcade-secondary': 'var(--arcade-secondary)',
              'arcade-choice': 'var(--arcade-choice)',
            },
            fontFamily: {
              arcade: ['"Press Start 2P"', 'cursive'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #020202;
        --accent-gold: #fff01f;
        --arcade-accent: #ffffff;
        --arcade-secondary: #ff00e0;
        --arcade-choice: #00f3ff;
      }
      body {
        font-family: 'VT323', monospace;
        background-color: var(--bg-color);
        color: #e5e5e5;
        font-size: 1.25rem;
        line-height: 1.4;
      }
      .font-arcade {
        font-family: 'Press Start 2P', cursive;
        letter-spacing: 0.05em;
      }
      
      /* Glitch Effect */
      .glitch-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .glitch {
        position: relative;
        color: white;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        will-change: transform;
      }

      .glitch::before,
      .glitch::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        clip-path: inset(100% 0 0 0);
        will-change: clip-path, transform;
      }

      .glitch::before {
        text-shadow: -2px 0 #ff00e0;
        animation: glitch-anim-1 3s infinite linear alternate-reverse;
      }

      .glitch::after {
        text-shadow: 2px 0 #00f3ff;
        animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
      }

      @keyframes glitch-anim-1 {
        0% { clip-path: inset(20% 0 70% 0); transform: translate(-2px, 0); }
        10% { clip-path: inset(60% 0 10% 0); transform: translate(2px, 0); }
        20% { clip-path: inset(10% 0 80% 0); transform: translate(-1px, 0); }
        30% { clip-path: inset(80% 0 5% 0); transform: translate(1px, 0); }
        40% { clip-path: inset(40% 0 45% 0); transform: translate(-2px, 0); }
        50% { clip-path: inset(70% 0 20% 0); transform: translate(2px, 0); }
        60% { clip-path: inset(15% 0 75% 0); transform: translate(-1px, 0); }
        70% { clip-path: inset(85% 0 10% 0); transform: translate(1px, 0); }
        80% { clip-path: inset(30% 0 60% 0); transform: translate(-2px, 0); }
        90% { clip-path: inset(55% 0 35% 0); transform: translate(2px, 0); }
        100% { clip-path: inset(20% 0 70% 0); transform: translate(-2px, 0); }
      }

      @keyframes glitch-anim-2 {
        0% { clip-path: inset(80% 0 5% 0); transform: translate(2px, 0); }
        10% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 0); }
        20% { clip-path: inset(55% 0 35% 0); transform: translate(1px, 0); }
        30% { clip-path: inset(20% 0 70% 0); transform: translate(-1px, 0); }
        40% { clip-path: inset(70% 0 20% 0); transform: translate(2px, 0); }
        50% { clip-path: inset(40% 0 45% 0); transform: translate(-2px, 0); }
        60% { clip-path: inset(85% 0 10% 0); transform: translate(1px, 0); }
        70% { clip-path: inset(15% 0 75% 0); transform: translate(-1px, 0); }
        80% { clip-path: inset(60% 0 10% 0); transform: translate(2px, 0); }
        90% { clip-path: inset(30% 0 60% 0); transform: translate(-2px, 0); }
        100% { clip-path: inset(80% 0 5% 0); transform: translate(2px, 0); }
      }
      .font-formal {
        font-family: 'Press Start 2P', cursive;
        font-size: 0.8rem;
      }
      .accent-border {
        border-color: var(--arcade-secondary);
        border-width: 2px;
        box-shadow: 0 0 10px var(--arcade-secondary);
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }
      /* Custom scrollbar for the image gallery */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Arcade specific styles */
      .arcade-button {
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid currentColor;
        box-shadow: 4px 4px 0 currentColor;
        transition: all 0.1s;
      }
      .arcade-button:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--arcade-accent);
      }
      .scanline {
        width: 100%;
        height: 100px;
        z-index: 9999;
        background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
        opacity: 0.1;
        position: fixed;
        bottom: 100%;
        animation: scanline 10s linear infinite;
        pointer-events: none;
      }
      @keyframes scanline {
        0% { bottom: 100%; }
        100% { bottom: -100px; }
      }
      @keyframes vibrate-idle {
        0%, 100% { transform: translateX(0) rotate(0deg); }
        25% { transform: translateX(-0.4px) rotate(0.1deg); }
        75% { transform: translateX(0.4px) rotate(-0.1deg); }
      }
      @keyframes vibrate-active {
        0%, 100% { transform: translateX(0) scale(1); }
        25% { transform: translateX(0.5px) scale(1.01); }
        75% { transform: translateX(-0.5px) scale(0.99); }
      }
      @keyframes weave {
        0%, 100% { margin-top: 0; }
        25% { margin-top: -15px; }
        75% { margin-top: 15px; }
      }
      @keyframes smoke-puff {
        0% { transform: translate(0, 0) scale(0.2); opacity: 0; }
        10% { opacity: 0.6; }
        100% { transform: translate(-40px, -10px) scale(2.5); opacity: 0; }
      }
      .vibrate-idle {
        animation: vibrate-idle 0.15s linear infinite;
      }
      .vibrate-active {
        animation: vibrate-active 0.08s linear infinite;
      }
      .weave {
        animation: weave 2s ease-in-out infinite;
      }
      .smoke-particle {
        animation: smoke-puff 0.8s ease-out infinite;
      }
      @keyframes road-lines {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
      }
      @keyframes buildings-scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-33.33%); }
      }
      @keyframes arcade-neon-pulse {
        0%, 100% { 
          text-shadow: 0 0 10px var(--arcade-choice), 0 0 20px var(--arcade-choice);
        }
        50% { 
          text-shadow: 0 0 15px var(--arcade-secondary), 0 0 30px var(--arcade-secondary);
        }
      }
      @keyframes nyan-run {
        0% { transform: translateX(-100vw); }
        50% { transform: translateX(150vw); }
        100% { transform: translateX(400vw); }
      }
      @keyframes nyan-trail-wave {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(10px); }
      }
      .road-line {
        animation: road-lines 0.8s linear infinite;
      }
      .animate-buildings-scroll {
        animation: buildings-scroll 8s linear infinite;
      }
      .animate-arcade-neon {
        animation: arcade-neon-pulse 2s ease-in-out infinite;
      }
      .animate-nyan {
        animation: nyan-run 4s ease-in forwards;
      }
      .animate-nyan-trail {
        animation: nyan-trail-wave 0.4s step-end infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
</head>
  <body>
    <div class="scanline"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
